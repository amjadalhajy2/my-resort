<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منتجع الاستراحات الثلاث</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* تنسيق التقويم ليكون مريحاً للعين */
        .fc { 
            background: white; 
            border-radius: 24px; 
            overflow: hidden; 
            border: none !important; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
        }
        
        .fc-header-toolbar { 
            background: #1e1b4b; 
            color: white; 
            padding: 15px !important; 
            margin-bottom: 0 !important;
        }

        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 900; }
        
        /* تصميم مربعات الأيام */
        .fc-daygrid-day-frame { min-height: 100px !important; }
        .fc-daygrid-day-number { 
            font-weight: 900; 
            padding: 5px !important; 
            color: #475569;
            font-size: 0.9rem;
        }

        /* قائمة الاستراحات العمودية داخل كل يوم */
        .resort-stack {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 2px 4px;
        }

        .resort-item {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 0;
            border-radius: 4px;
            text-align: center;
            border: 1px solid transparent;
        }

        /* حالات التوفر */
        .status-free { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .status-busy { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }

        /* نموذج الحجز المنبثق من الأسفل */
        #bookingModal {
            transition: transform 0.3s ease-out;
        }
    </style>
</head>
<body class="pb-24">

    <header class="bg-indigo-950 pt-12 pb-24 px-6 rounded-b-[4rem] shadow-2xl text-center relative">
        <div class="relative z-10">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-xl border-4 border-indigo-500/30">
                <span class="text-indigo-900 text-3xl font-black">3R</span>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">منتجع الاستراحات الثلاث</h1>
            <p class="text-indigo-300 text-xs mt-2 font-bold uppercase tracking-widest">فخامة تستحقها</p>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-12 relative z-20">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="bg-white p-5 rounded-[2rem] shadow-lg flex flex-col items-center gap-3 border border-indigo-50 active:scale-95 transition">
                <span class="text-3xl">📸</span>
                <span class="text-xs font-black text-indigo-900">صور المنتجع</span>
            </button>
            <button onclick="alert('شروطنا: الحفاظ على المرافق، الدخول 2م، الخروج 10ص')" class="bg-white p-5 rounded-[2rem] shadow-lg flex flex-col items-center gap-3 border border-indigo-50 active:scale-95 transition">
                <span class="text-3xl">📜</span>
                <span class="text-xs font-black text-indigo-900">الشروط</span>
            </button>
        </div>

        <div id="calendar" class="mb-8"></div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-indigo-50 flex justify-around items-center text-[10px] font-bold text-slate-500">
            <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-100 border border-green-200 rounded"></span> متوفر</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 bg-red-100 border border-red-200 rounded"></span> محجوز</div>
        </div>
    </main>

    <div id="bookingModal" class="hidden fixed inset-0 bg-indigo-950/80 backdrop-blur-sm z-[100] flex items-end md:items-center justify-center">
        <div class="bg-white w-full max-w-md p-8 rounded-t-[3rem] md:rounded-[3rem] shadow-2xl">
            <div class="w-12 h-1.5 bg-slate-200 mx-auto mb-6 rounded-full md:hidden"></div>
            <h2 class="text-xl font-black mb-6 text-indigo-950 border-r-4 border-indigo-600 pr-3">طلب حجز جديد</h2>
            
            <div class="space-y-4">
                <div class="bg-indigo-50 p-4 rounded-2xl">
                    <p class="text-[10px] text-indigo-400 font-black uppercase mb-1">تاريخ الحجز</p>
                    <p id="resDate" class="font-bold text-indigo-900 text-lg"></p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="resResort" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold text-sm">
                        <option>الاستراحة الملكية</option>
                        <option>الاستراحة العائلية</option>
                        <option>استراحة الهدوء</option>
                    </select>
                    <select id="resType" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold text-sm">
                        <option>مبيت</option>
                        <option>بدون مبيت</option>
                    </select>
                </div>

                <input type="text" id="resName" placeholder="اسمك الكريم" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold">
                <input type="tel" id="resPhone" placeholder="رقم هاتفك" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold text-left">

                <div class="flex gap-3 pt-4">
                    <button onclick="sendBooking()" id="submitBtn" class="bg-indigo-600 text-white flex-[2] py-4 rounded-2xl font-black shadow-xl active:scale-95 transition">تأكيد الحجز</button>
                    <button onclick="closeModal()" class="bg-slate-100 text-slate-400 flex-1 py-4 rounded-2xl font-bold">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/96894066056" class="fixed bottom-6 left-6 bg-green-500 text-white p-5 rounded-full shadow-2xl border-4 border-white z-50 hover:scale-110 active:scale-90 transition-all">
        <svg width="28" height="28" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
    </a>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLLRJD7qjht_uxuq5G8uAnw-7nKWYpUJlghzJmANSxujwqPaTh-RQ7S_7McRzw3k7KWg/exec';

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ar',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                dateClick: function(info) {
                    document.getElementById('resDate').innerText = info.dateStr;
                    document.getElementById('bookingModal').classList.remove('hidden');
                },
                dayCellContent: function(arg) {
                    // بناء قائمة الاستراحات عمودياً
                    let html = `
                        <div class="fc-daygrid-day-number">${arg.dayNumberText}</div>
                        <div class="resort-stack">
                            <div class="resort-item status-free">الملكية</div>
                            <div class="resort-item status-free">العائلية</div>
                            <div class="resort-item status-free">الهادئة</div>
                        </div>
                    `;
                    return { html: html };
                }
            });
            calendar.render();
        });

        function closeModal() {
            document.getElementById('bookingModal').classList.add('hidden');
        }

        function sendBooking() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const data = {
                resort: document.getElementById('resResort').value,
                date: document.getElementById('resDate').innerText,
                type: document.getElementById('resType').value,
                name: document.getElementById('resName').value,
                phone: document.getElementById('resPhone').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("تم استلام طلبك! سنتواصل معك للتأكيد.");
                location.reload();
            }).catch(() => {
                alert("حدث خطأ، يرجى المحاولة لاحقاً.");
                btn.disabled = false;
                btn.innerText = "تأكيد الحجز";
            });
        }
    </script>
</body>
</html>
