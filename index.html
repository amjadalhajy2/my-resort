<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    .fc-event { background: transparent !important; border: none !important; color: inherit !important; }
    .resort-tag { font-size: 0.7rem; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; display: block; text-align: center; }
  </style>
</head>
<body class="bg-slate-50 pb-20">

  <div class="bg-indigo-900 text-white p-6 text-center rounded-b-[3rem] shadow-xl">
    <div class="w-16 h-16 bg-white rounded-full mx-auto mb-3 flex items-center justify-center text-indigo-900 font-bold">شعار</div>
    <h1 class="text-xl font-bold">منتجع الاستراحات الثلاث</h1>
  </div>

  <div class="flex gap-2 p-4 overflow-x-auto justify-center -mt-6">
    <button class="bg-white shadow-md px-4 py-2 rounded-full text-xs font-bold border-b-2 border-blue-500">صور استراحة A</button>
    <button class="bg-white shadow-md px-4 py-2 rounded-full text-xs font-bold border-b-2 border-green-500">صور استراحة B</button>
    <button class="bg-white shadow-md px-4 py-2 rounded-full text-xs font-bold border-b-2 border-red-500">صور استراحة C</button>
  </div>

  <div class="p-4">
    <div id="calendar" class="bg-white p-2 rounded-2xl shadow-lg overflow-hidden"></div>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm p-6 rounded-3xl shadow-2xl">
      <h3 class="text-lg font-bold mb-4 border-b pb-2">تفاصيل طلب الحجز</h3>
      <input type="hidden" id="bookingDate">
      <label class="block text-sm mb-1">الاستراحة</label>
      <select id="resort" class="w-full border mb-3 p-2 rounded-lg"><option>استراحة A</option><option>استراحة B</option><option>استراحة C</option></select>
      <label class="block text-sm mb-1">نوع الحجز</label>
      <select id="type" class="w-full border mb-3 p-2 rounded-lg"><option>مبيت</option><option>بدون مبيت</option></select>
      <input type="text" id="name" placeholder="الاسم" class="w-full border mb-3 p-2 rounded-lg">
      <input type="tel" id="phone" placeholder="رقم الهاتف" class="w-full border mb-4 p-2 rounded-lg">
      <div class="flex gap-2">
        <button onclick="confirmBooking()" class="bg-indigo-600 text-white flex-1 py-3 rounded-xl font-bold">تأكيد</button>
        <button onclick="closeModal()" class="bg-gray-100 flex-1 py-3 rounded-xl">إلغاء</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      google.script.run.withSuccessHandler(function(data) {
        var events = data.map(function(row) {
          return {
            title: row[0].split(' ')[1] + ' محجوزة', // يعرض حرف A او B او C
            start: row[1],
            color: '#fee2e2',
            textColor: '#ef4444'
          };
        });

        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          locale: 'ar',
          headerToolbar: { left: 'prev,next', center: 'title', right: '' },
          events: events,
          dateClick: function(info) {
            document.getElementById('bookingDate').value = info.dateStr;
            document.getElementById('modal').classList.remove('hidden');
          }
        });
        calendar.render();
      }).getCalendarData();
    });

    function confirmBooking() {
      var obj = {
        date: document.getElementById('bookingDate').value,
        resort: document.getElementById('resort').value,
        type: document.getElementById('type').value,
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value
      };
      google.script.run.withSuccessHandler(function(msg) {
        alert(msg);
        closeModal();
      }).saveBooking(obj);
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  </script>
</body>
</html>
