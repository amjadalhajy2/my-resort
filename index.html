<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منتجع الاستراحات الثلاث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        
        /* تنسيق التقويم */
        .fc { background: white; border-radius: 24px; overflow: hidden; border: none !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .fc-header-toolbar { padding: 20px !important; background: #1e1b4b; color: white; margin-bottom: 0 !important; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: bold; }
        .fc-daygrid-day-number { font-weight: bold; color: #1e293b; padding: 5px !important; display: block; text-align: center; width: 100%; }
        
        /* حاوية أسماء الاستراحات */
        .resort-stack {
            display: flex;
            flex-direction: column; /* ترتيب فوق بعض */
            gap: 2px;
            padding: 2px;
            margin-top: 2px;
        }
        
        /* بطاقة اسم الاستراحة */
        .resort-name {
            font-size: 0.6rem; /* حجم خط مناسب للهاتف */
            padding: 2px 1px;
            border-radius: 3px;
            text-align: center;
            font-weight: 700;
            display: block;
            border: 1px solid transparent;
        }

        /* ألوان الحالة */
        .is-available { background-color: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .is-booked { background-color: #fee2e2; color: #991b1b; border-color: #fecaca; }

        /* تعديل ارتفاع مربعات التقويم لعدم التداخل */
        .fc-daygrid-day-frame { min-height: 90px !important; }
        
        /* إخفاء الأزرار الزائدة في الهاتف */
        @media (max-width: 640px) {
            .fc-toolbar-chunk { display: flex; gap: 2px; }
            .fc-button { padding: 4px 8px !important; font-size: 0.8rem !important; }
        }
    </style>
</head>
<body class="pb-28">

    <header class="bg-indigo-950 pt-12 pb-20 px-6 rounded-b-[3.5rem] shadow-2xl text-center relative">
        <div class="relative z-10">
            <div class="w-20 h-20 bg-white rounded-[2rem] mx-auto mb-4 flex items-center justify-center shadow-xl border-4 border-indigo-500/20">
                <span class="text-indigo-900 text-3xl font-black">3R</span>
            </div>
            <h1 class="text-2xl font-bold text-white uppercase tracking-wider">منتجع الاستراحات الثلاث</h1>
            <p class="text-indigo-300 text-xs mt-2 font-medium">اختر استراحتك المفضلة واحجز الآن</p>
        </div>
    </header>

    <main class="container mx-auto px-4 -mt-10 relative z-20">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <button class="bg-white p-4 rounded-3xl shadow-sm flex flex-col items-center gap-2 border border-indigo-50">
                <span class="text-2xl">🏞️</span><span class="text-[10px] font-bold text-slate-600">صور الاستراحات</span>
            </button>
            <button onclick="document.getElementById('rulesModal').classList.toggle('hidden')" class="bg-white p-4 rounded-3xl shadow-sm flex flex-col items-center gap-2 border border-indigo-50">
                <span class="text-2xl">📜</span><span class="text-[10px] font-bold text-slate-600">الشروط</span>
            </button>
        </div>

        <div id="calendar"></div>
    </main>

    <div id="bookingModal" class="hidden fixed inset-0 bg-indigo-950/80 backdrop-blur-md z-[100] flex items-end md:items-center justify-center">
        <div class="bg-white w-full max-w-md p-8 rounded-t-[3rem] md:rounded-[3rem] shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-indigo-900 border-r-4 border-indigo-600 pr-3">تفاصيل الطلب</h2>
            <div class="space-y-4">
                <div class="bg-indigo-50 p-4 rounded-2xl">
                    <p class="text-[10px] text-indigo-400 font-bold uppercase">التاريخ المختار</p>
                    <p id="resDate" class="font-bold text-indigo-900"></p>
                </div>
                <select id="resResort" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-600">
                    <option>الاستراحة الملكية</option>
                    <option>الاستراحة العائلية</option>
                    <option>استراحة الهدوء</option>
                </select>
                <select id="resType" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200">
                    <option>مبيت</option>
                    <option>بدون مبيت</option>
                </select>
                <input type="text" id="resName" placeholder="الاسم الكامل" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200">
                <input type="tel" id="resPhone" placeholder="رقم الهاتف" class="w-full bg-slate-50 p-4 rounded-2xl border-none ring-1 ring-slate-200">
                <div class="flex gap-3 pt-4">
                    <button onclick="confirmBooking()" class="bg-indigo-600 text-white flex-[2] py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">إرسال الطلب</button>
                    <button onclick="document.getElementById('bookingModal').classList.add('hidden')" class="bg-slate-100 text-slate-400 flex-1 py-4 rounded-2xl font-bold">إلغاء</button>
                </div>
            </div>
        </div>
    </div>
